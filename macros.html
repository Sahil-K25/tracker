<!DOCTYPE html>

<head>
<meta charset="UTF-8" />

<meta name="theme-color" content="#0C0C12" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<meta name="apple-mobile-web-app-title" content="Patron" />

<script>(function(){try{var p=JSON.parse(localStorage.getItem('patron_profile_v1')||'null');var n=(p&&p.name)?String(p.name).trim().split(/\s+/)[0]:'Sahil';document.title=document.title.replace('Sahil',n);}catch(e){}})();</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("patron_theme")||"nocturne");}catch(e){document.documentElement.setAttribute("data-theme","nocturne");}</script>
<link rel="stylesheet" href="theme.css" />

<style>
  /* page-specific layout — all colours/sizes still come from theme.css tokens */
  .macroGrid { display:grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); }
  @media (max-width: 560px) { .macroGrid { grid-template-columns: repeat(2, 1fr); } }
  .macroBox { display:flex; flex-direction:column; gap:4px; padding: var(--space-4); border:1px solid var(--border); border-radius: var(--radius-md); background: var(--surface); }
  .macroBox[data-accent="cal"] { border-color: var(--brand-line); background: var(--brand-soft); }
  .macroVal { font-family: var(--font-display); font-weight:600; font-size: var(--text-2xl); letter-spacing:-0.02em; font-variant-numeric: tabular-nums; }
  .macroLabel { font-family: var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color: var(--muted); }

  /* MyFitnessPal-style header: Goal − Food = Remaining + a progress bar */
  .calHead { display:flex; align-items:center; justify-content:space-between; gap: var(--space-4); flex-wrap:wrap; margin-bottom: var(--space-4); }
  .calMath { display:flex; align-items:center; gap: var(--space-5); flex-wrap:wrap; }
  .calCell { display:flex; flex-direction:column; gap:2px; }
  .calCell .n { font-family: var(--font-display); font-weight:600; font-size: var(--text-2xl); letter-spacing:-0.02em; font-variant-numeric: tabular-nums; }
  .calCell .l { font-family: var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color: var(--muted); }
  .calOp { font-family: var(--font-display); font-size: var(--text-xl); color: var(--muted); }
  .calCell.remain .n { color: var(--brand); }
  .calCell.remain.over .n { color: var(--neg); }
  .goalEdit { display:flex; align-items:center; gap:8px; }
  .goalEdit .fieldInput { width: 92px; }
  .bar { height: 10px; border-radius: var(--radius-pill); background: var(--track); overflow:hidden; }
  .barFill { height:100%; border-radius: var(--radius-pill); background: var(--brand); transition: width var(--duration) var(--ease-premium); }
  .barFill.over { background: var(--neg); }

  .search { position: relative; margin: var(--space-5) 0 var(--space-3); }
  .results { display:flex; flex-direction:column; gap:6px; margin-top: var(--space-3); }
  .foodRow { display:flex; align-items:center; justify-content:space-between; gap: var(--space-3); padding: 10px 12px; border:1px solid var(--border); border-radius: var(--radius-md); background: var(--surface); }
  .foodRow .meta { font-family: var(--font-mono); font-size:11px; color: var(--muted); }
  .foodName { font-weight:600; font-size: var(--text-sm); }
  .gramInput { width: 74px; }
  .empty { color: var(--muted); font-size: 13px; padding: var(--space-4) 0; }

  .logList { display:flex; flex-direction:column; gap:6px; margin-top: var(--space-3); }
  .logRow { display:flex; align-items:center; justify-content:space-between; gap: var(--space-3); padding: 10px 12px; border:1px solid var(--border); border-radius: var(--radius-md); background: var(--surface); }
  .logRow .nums { font-family: var(--font-mono); font-size:11px; color: var(--muted-strong); }
  .xBtn { background:transparent; border:1px solid var(--border); color:var(--muted); width:26px; height:26px; border-radius:50%; cursor:pointer; flex-shrink:0; }
  .xBtn:hover { color: var(--neg); border-color: var(--neg-line); }
  .sectionTitle { font-family: var(--font-display); font-weight:600; font-size: var(--text-lg); margin: var(--space-8) 0 0; }

  /* Custom foods/meals */
  .customFoodGrid { display:grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); margin-top: var(--space-3); }
  @media (max-width: 560px) { .customFoodGrid { grid-template-columns: repeat(2, 1fr); } }
  .customFoodUnitToggle { display:flex; gap: var(--space-2); }
  .customFoodUnitToggle .btn { flex:1; }
  .customFoodActions { display:flex; align-items:center; justify-content:flex-end; gap: var(--space-3); margin-top: var(--space-3); }
  .customFoodList { display:flex; flex-direction:column; gap:6px; margin-top: var(--space-3); }
  .customTag { font-family: var(--font-mono); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color: var(--brand); }
</style>
</head>
<body>
<main class="page grain-overlay">
  <div class="shell" id="app"></div>
</main>

<script src="theme.js"></script>
<script>
/* ============================================================
 * Macros — a simple daily food + macro tracker.
 * Data is saved per-day in localStorage under macros_standalone_v1.
 * ============================================================ */
const STORE_KEY = 'macros_standalone_v1';

/* A small built-in food database (values per 100g). Add your own here. */
const FOODS = [
  { name: 'Chicken breast',  cal: 165, p: 31,  c: 0,   f: 3.6 },
  { name: 'Beef mince (5%)', cal: 137, p: 21,  c: 0,   f: 5   },
  { name: 'Salmon',          cal: 208, p: 20,  c: 0,   f: 13  },
  { name: 'Egg',             cal: 143, p: 13,  c: 1.1, f: 9.5 },
  { name: 'Greek yogurt',    cal: 59,  p: 10,  c: 3.6, f: 0.4 },
  { name: 'Whey protein',    cal: 400, p: 80,  c: 8,   f: 6   },
  { name: 'White rice',      cal: 130, p: 2.7, c: 28,  f: 0.3 },
  { name: 'Oats',            cal: 389, p: 17,  c: 66,  f: 7   },
  { name: 'Pasta (cooked)',  cal: 157, p: 6,   c: 31,  f: 0.9 },
  { name: 'Potato',          cal: 77,  p: 2,   c: 17,  f: 0.1 },
  { name: 'Sweet potato',    cal: 86,  p: 1.6, c: 20,  f: 0.1 },
  { name: 'Banana',          cal: 89,  p: 1.1, c: 23,  f: 0.3 },
  { name: 'Apple',           cal: 52,  p: 0.3, c: 14,  f: 0.2 },
  { name: 'Broccoli',        cal: 34,  p: 2.8, c: 7,   f: 0.4 },
  { name: 'Almonds',         cal: 579, p: 21,  c: 22,  f: 50  },
  { name: 'Peanut butter',   cal: 588, p: 25,  c: 20,  f: 50  },
  { name: 'Olive oil',       cal: 884, p: 0,   c: 0,   f: 100 },
  { name: 'Avocado',         cal: 160, p: 2,   c: 9,   f: 15  },
  { name: 'Cheddar cheese',  cal: 402, p: 25,  c: 1.3, f: 33  },
  { name: 'Milk (whole)',    cal: 61,  p: 3.2, c: 4.8, f: 3.3 },
  { name: 'Bread (slice)',   cal: 265, p: 9,   c: 49,  f: 3.2 },
  { name: 'Tuna (canned)',   cal: 116, p: 26,  c: 0,   f: 1   },
];

/* ---- storage helpers ---- */
function todayKey(){ const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function loadAll(){ try { const r = localStorage.getItem(STORE_KEY); return r ? JSON.parse(r) : {}; } catch(e){ return {}; } }
function saveAll(o){ try { localStorage.setItem(STORE_KEY, JSON.stringify(o)); } catch(e){} }
let store = loadAll();
function todaysLog(){ return store[todayKey()] || []; }
function setTodaysLog(list){ store[todayKey()] = list; saveAll(store); }
function goalCal(){ return store.goalCal != null ? store.goalCal : 2000; } // daily calorie target (editable)
function setGoalCal(n){ store.goalCal = n; saveAll(store); }
function goalProtein(){ return store.goalProtein != null ? store.goalProtein : 150; } // daily protein target in g (editable)
function setGoalProtein(n){ store.goalProtein = n; saveAll(store); }

/* ---- custom foods/meals (user-defined, remembered macros per 100g) ---- */
function getCustomFoods(){ return Array.isArray(store.customFoods) ? store.customFoods : []; }
function setCustomFoods(list){ store.customFoods = list; saveAll(store); }

/* ---- built-in foods the user has removed from their list ---- */
function getHiddenFoods(){ return Array.isArray(store.hiddenFoods) ? store.hiddenFoods : []; }
function setHiddenFoods(list){ store.hiddenFoods = list; saveAll(store); }

function allFoods(){
  const hidden = getHiddenFoods();
  return FOODS.filter(f => !hidden.includes(f.name)).concat(getCustomFoods());
}

function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function round(n){ return Math.round(n); }
function r1(n){ return Math.round(n*10)/10; }

let query = '';
let matches = [];
let cfUnit = 'per100g'; // 'per100g' (scales with grams) or 'serving' (whole meal, fixed amount)

function cfLabels(unit){
  return unit === 'serving'
    ? { cal:'Calories (meal)', p:'Protein g (meal)', c:'Carbs g (meal)', f:'Fat g (meal)',
        hint:'Logged as one fixed item each time — good for whole meals/dishes where you know the total.' }
    : { cal:'Calories /100g', p:'Protein /100g', c:'Carbs /100g', f:'Fat /100g',
        hint:'Scales with the grams you log — good for individual ingredients.' };
}

/* ---- calculations ---- */
function totals(){
  return todaysLog().reduce((t, e) => {
    t.cal += e.cal; t.p += e.p; t.c += e.c; t.f += e.f; return t;
  }, { cal:0, p:0, c:0, f:0 });
}

/* ---- views ---- */
// MyFitnessPal-style: Goal − Food = Remaining. Split out so the #goal input
// can refresh just these two pieces on every keystroke (see input handler
// below) instead of re-rendering the whole page and losing the caret.
const calCell = (cls, n, l) => '<div class="calCell ' + cls + '"><span class="n">' + round(n) + '</span><span class="l">' + l + '</span></div>';
function goalMathInner(value, goal){
  const remaining = goal - value;
  const over = remaining < 0;
  return calCell('', goal, 'goal')
    + '<span class="calOp">−</span>'
    + calCell('', value, 'food')
    + '<span class="calOp">=</span>'
    + calCell('remain' + (over ? ' over' : ''), Math.abs(remaining), over ? 'over' : 'remaining');
}
function goalBarInner(value, goal){
  const over = (goal - value) < 0;
  const pct = Math.min(100, goal > 0 ? (value / goal) * 100 : 0);
  return '<div class="barFill' + (over ? ' over' : '') + '" style="width:' + pct + '%"></div>';
}
function calMathInner(t, goal){ return goalMathInner(t.cal, goal); }
function barInner(t, goal){ return goalBarInner(t.cal, goal); }
function proteinMathInner(t, goal){ return goalMathInner(t.p, goal); }
function proteinBarInner(t, goal){ return goalBarInner(t.p, goal); }

function summaryHtml(){
  const t = totals();
  const goal = goalCal();
  const goalP = goalProtein();

  const head = '<div class="calHead">'
    + '<div class="calMath" id="calMath">' + calMathInner(t, goal) + '</div>'
    + '<div class="goalEdit"><span class="calCell"><span class="l">daily goal</span></span>'
    + '<input class="fieldInput" id="goal" type="number" min="0" step="50" value="' + goal + '" /></div>'
    + '</div>';
  const bar = '<div class="bar" id="calBar">' + barInner(t, goal) + '</div>';

  const proteinHead = '<div class="calHead" style="margin-top:var(--space-4)">'
    + '<div class="calMath" id="proteinMath">' + proteinMathInner(t, goalP) + '</div>'
    + '<div class="goalEdit"><span class="calCell"><span class="l">protein goal (g)</span></span>'
    + '<input class="fieldInput" id="goalProtein" type="number" min="0" step="5" value="' + goalP + '" /></div>'
    + '</div>';
  const proteinBar = '<div class="bar" id="proteinBar">' + proteinBarInner(t, goalP) + '</div>';

  const box = (accent, val, unit, label) =>
    '<div class="macroBox" data-accent="' + accent + '"><span class="macroVal">' + round(val) + (unit||'') + '</span><span class="macroLabel">' + label + '</span></div>';
  return '<section class="card"><span class="cardName">Today</span>'
    + head + bar
    + proteinHead + proteinBar
    + '<div class="macroGrid" style="margin-top:var(--space-4)">'
    + box('p', t.p, 'g', 'protein')
    + box('c', t.c, 'g', 'carbs')
    + box('f', t.f, 'g', 'fat')
    + box('cal', t.cal, '', 'calories')
    + '</div></section>';
}

function resultsInner(){
  const q = query.trim().toLowerCase();
  matches = q ? allFoods().filter(f => f.name.toLowerCase().includes(q)).slice(0, 8) : [];
  if (!q) return '<p class="empty">Start typing to find a food…</p>';
  if (!matches.length) return '<p class="empty">No match. Add it as a custom food below.</p>';
  return matches.map((f, i) => {
    const isServing = f.unit === 'serving';
    const meta = round(f.cal) + ' kcal · ' + r1(f.p) + 'P / ' + r1(f.c) + 'C / ' + r1(f.f) + (isServing ? 'F per meal' : 'F per 100g');
    const qtyInput = isServing
      ? '<input class="fieldInput gramInput" type="number" min="0" step="0.25" placeholder="×1" value="1" data-grams="' + i + '" />'
      : '<input class="fieldInput gramInput" type="number" min="0" placeholder="g" value="' + (f.isCustom ? '100' : '') + '" data-grams="' + i + '" />';
    return '<div class="foodRow"><div><div class="foodName">' + esc(f.name) + (f.isCustom ? ' <span class="customTag">yours</span>' : '') + '</div>'
      + '<div class="meta">' + meta + '</div></div>'
      + '<div style="display:flex;align-items:center;gap:8px;">'
      + qtyInput
      + '<button class="btn btn-primary" data-add="' + i + '">Add</button>'
      + '<button class="xBtn" data-remove="' + i + '" title="Remove from list">×</button></div></div>';
  }).join('');
}

function searchHtml(){
  return '<h2 class="sectionTitle">Add food</h2>'
    + '<div class="search"><input class="fieldInput" id="q" type="text" placeholder="Search foods (e.g. chicken, rice, banana)" value="' + esc(query) + '" autocomplete="off" /></div>'
    + '<div class="results" id="results">' + resultsInner() + '</div>';
}

function customFoodsHtml(){
  const list = getCustomFoods();
  const rows = list.length
    ? list.map((f, i) => {
        const isServing = f.unit === 'serving';
        const meta = round(f.cal) + ' kcal · ' + r1(f.p) + 'P / ' + r1(f.c) + 'C / ' + r1(f.f) + (isServing ? 'F per meal' : 'F per 100g');
        return '<div class="foodRow"><div><div class="foodName">' + esc(f.name) + '</div>'
          + '<div class="meta">' + meta + '</div></div>'
          + '<button class="xBtn" data-delcustom="' + i + '" title="Remove">×</button></div>';
      }).join('')
    : '<p class="empty">No custom foods yet — add one above and it\'ll show up in the food search too.</p>';

  const L = cfLabels(cfUnit);
  return '<h2 class="sectionTitle">Your foods</h2>'
    + '<div class="card"><span class="cardName">Add a custom food or meal</span>'
    + '<div class="field"><label class="fieldLabel">Name</label><input class="fieldInput" id="cfName" type="text" placeholder="e.g. Mum\'s chili" autocomplete="off" /></div>'
    + '<div class="field"><label class="fieldLabel">Measured as</label>'
    + '<div class="customFoodUnitToggle">'
    + '<button type="button" class="btn ' + (cfUnit === 'per100g' ? 'btn-primary' : 'btn-ghost') + '" data-unit="per100g">Per 100g</button>'
    + '<button type="button" class="btn ' + (cfUnit === 'serving' ? 'btn-primary' : 'btn-ghost') + '" data-unit="serving">Whole meal</button>'
    + '</div>'
    + '<p class="cardTag" id="cfHint">' + L.hint + '</p>'
    + '</div>'
    + '<div class="customFoodGrid">'
    + '<div class="field"><label class="fieldLabel" id="cfCalLabel">' + L.cal + '</label><input class="fieldInput" id="cfCal" type="number" min="0" step="1" placeholder="0" inputmode="decimal" /></div>'
    + '<div class="field"><label class="fieldLabel" id="cfPLabel">' + L.p + '</label><input class="fieldInput" id="cfP" type="number" min="0" step="0.1" placeholder="0" inputmode="decimal" /></div>'
    + '<div class="field"><label class="fieldLabel" id="cfCLabel">' + L.c + '</label><input class="fieldInput" id="cfC" type="number" min="0" step="0.1" placeholder="0" inputmode="decimal" /></div>'
    + '<div class="field"><label class="fieldLabel" id="cfFLabel">' + L.f + '</label><input class="fieldInput" id="cfF" type="number" min="0" step="0.1" placeholder="0" inputmode="decimal" /></div>'
    + '</div>'
    + '<p class="cardTag">"Log today only" adds these numbers to today\'s totals as-is, without saving a reusable food.</p>'
    + '<div class="customFoodActions">'
    + '<button type="button" class="btn btn-ghost" id="cfLogOnce">Log today only</button>'
    + '<button type="button" class="btn btn-primary" id="cfAdd">+ Save food</button>'
    + '</div>'
    + '</div>'
    + '<div class="customFoodList" id="customFoodList">' + rows + '</div>'
    + hiddenFoodsHtml();
}

function hiddenFoodsHtml(){
  const hidden = getHiddenFoods();
  if (!hidden.length) return '';
  const rows = hidden.map((name, i) =>
    '<div class="foodRow"><div class="foodName">' + esc(name) + '</div>'
    + '<button type="button" class="btn btn-ghost" data-restore="' + i + '">Restore</button></div>').join('');
  return '<h2 class="sectionTitle">Removed from your list</h2><div class="customFoodList">' + rows + '</div>';
}

function logHtml(){
  const log = todaysLog();
  if (!log.length) return '<h2 class="sectionTitle">Logged today</h2><p class="empty">Nothing logged yet.</p>';
  const rows = log.map((e, i) => {
    const qty = e.servings != null ? (r1(e.servings) + '×') : (e.grams + 'g');
    return '<div class="logRow"><div><div class="foodName">' + esc(e.name) + ' <span class="meta">' + qty + '</span></div>'
      + '<div class="nums">' + round(e.cal) + ' kcal · ' + round(e.p) + 'P / ' + round(e.c) + 'C / ' + round(e.f) + 'F</div></div>'
      + '<button class="xBtn" data-del="' + i + '" title="Remove">×</button></div>';
  }).join('');
  return '<h2 class="sectionTitle">Logged today</h2><div class="logList">' + rows + '</div>';
}

function headerHtml(){
  return '<header class="header"><div><h1 class="title">Macros</h1><p class="subtitle">protein · carbs · fat</p></div>'
    + '<div class="headerControls"><a class="backLink" href="index.html">← Dashboard</a><span id="themeSeg"></span></div></header>';
}

function render(){
  document.getElementById('app').innerHTML =
    headerHtml() + summaryHtml() + searchHtml() + customFoodsHtml() + logHtml();
  document.getElementById('themeSeg').innerHTML = Patron.switcherHtml();
}

/* ---- events ---- */
document.addEventListener('input', e => {
  if (e.target.id === 'q') {
    query = e.target.value;
    // re-render only the results list so the search box keeps focus + caret
    document.getElementById('results').innerHTML = resultsInner();
  }
  if (e.target.id === 'goal') {
    const n = Number(e.target.value);
    setGoalCal(isFinite(n) && n >= 0 ? n : 0);
    // refresh just the math + bar so the goal input itself is never
    // recreated — keeps focus and caret position intact while typing
    const t = totals();
    const goal = goalCal();
    document.getElementById('calMath').innerHTML = calMathInner(t, goal);
    document.getElementById('calBar').innerHTML = barInner(t, goal);
  }
  if (e.target.id === 'goalProtein') {
    const n = Number(e.target.value);
    setGoalProtein(isFinite(n) && n >= 0 ? n : 0);
    const t = totals();
    const goalP = goalProtein();
    document.getElementById('proteinMath').innerHTML = proteinMathInner(t, goalP);
    document.getElementById('proteinBar').innerHTML = proteinBarInner(t, goalP);
  }
});

document.addEventListener('click', e => {
  const add = e.target.closest('[data-add]');
  if (add) {
    const f = matches[Number(add.getAttribute('data-add'))];
    const amountEl = document.querySelector('[data-grams="' + add.getAttribute('data-add') + '"]');
    const amount = Number(amountEl && amountEl.value);
    if (!f || !isFinite(amount) || amount <= 0) { alert(f && f.unit === 'serving' ? 'Enter how many servings.' : 'Enter how many grams.'); return; }
    const log = todaysLog();
    if (f.unit === 'serving') {
      log.push({ name: f.name, servings: amount, cal: f.cal*amount, p: f.p*amount, c: f.c*amount, f: f.f*amount });
    } else {
      const k = amount / 100;
      log.push({ name: f.name, grams: amount, cal: f.cal*k, p: f.p*k, c: f.c*k, f: f.f*k });
    }
    setTodaysLog(log);
    query = '';
    render();
    return;
  }
  const del = e.target.closest('[data-del]');
  if (del) {
    const log = todaysLog();
    log.splice(Number(del.getAttribute('data-del')), 1);
    setTodaysLog(log);
    render();
    return;
  }
  const remove = e.target.closest('[data-remove]');
  if (remove) {
    const f = matches[Number(remove.getAttribute('data-remove'))];
    if (!f) return;
    if (f.isCustom) {
      const list = getCustomFoods();
      const idx = list.indexOf(f);
      if (idx > -1) list.splice(idx, 1);
      setCustomFoods(list);
    } else {
      const hidden = getHiddenFoods();
      if (!hidden.includes(f.name)) { hidden.push(f.name); setHiddenFoods(hidden); }
    }
    render();
    return;
  }
  const restore = e.target.closest('[data-restore]');
  if (restore) {
    const hidden = getHiddenFoods();
    hidden.splice(Number(restore.getAttribute('data-restore')), 1);
    setHiddenFoods(hidden);
    render();
    return;
  }
  if (e.target.id === 'cfLogOnce') {
    const name = document.getElementById('cfName').value.trim();
    if (!name) { alert('Give it a name.'); return; }
    const num = id => Math.max(0, Number(document.getElementById(id).value) || 0);
    // logs the entered totals as today's entry only — doesn't save it to "Your foods"
    const log = todaysLog();
    log.push({ name, servings: 1, cal: num('cfCal'), p: num('cfP'), c: num('cfC'), f: num('cfF') });
    setTodaysLog(log);
    render();
    return;
  }
  if (e.target.id === 'cfAdd') {
    const name = document.getElementById('cfName').value.trim();
    if (!name) { alert('Give your food a name.'); return; }
    const num = id => Math.max(0, Number(document.getElementById(id).value) || 0);
    const list = getCustomFoods();
    list.push({ name, cal: num('cfCal'), p: num('cfP'), c: num('cfC'), f: num('cfF'), unit: cfUnit, isCustom: true });
    setCustomFoods(list);
    render();
    return;
  }
  const delCustom = e.target.closest('[data-delcustom]');
  if (delCustom) {
    const list = getCustomFoods();
    list.splice(Number(delCustom.getAttribute('data-delcustom')), 1);
    setCustomFoods(list);
    query = '';
    render();
    return;
  }
  const unitBtn = e.target.closest('[data-unit]');
  if (unitBtn) {
    cfUnit = unitBtn.getAttribute('data-unit');
    unitBtn.parentElement.querySelectorAll('[data-unit]').forEach(b => {
      const active = b.getAttribute('data-unit') === cfUnit;
      b.classList.toggle('btn-primary', active);
      b.classList.toggle('btn-ghost', !active);
    });
    const L = cfLabels(cfUnit);
    document.getElementById('cfHint').textContent = L.hint;
    document.getElementById('cfCalLabel').textContent = L.cal;
    document.getElementById('cfPLabel').textContent = L.p;
    document.getElementById('cfCLabel').textContent = L.c;
    document.getElementById('cfFLabel').textContent = L.f;
    return;
  }
});

// keep totals in sync if edited in another tab
window.addEventListener('storage', e => { if (e.key === STORE_KEY) { store = loadAll(); render(); } });

render();
</script>
</body>
</html>
