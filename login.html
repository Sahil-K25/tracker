<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0C0C12" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Patron" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />

<title>Sign in · Patron</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>html{visibility:hidden}</style>
<script>setTimeout(function(){document.documentElement.style.visibility='';},4000);</script>
<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("patron_theme")||"nocturne");}catch(e){document.documentElement.setAttribute("data-theme","nocturne");}</script>

<link rel="stylesheet" href="theme.css" />
<style>
  .page { display:flex; align-items:center; justify-content:center; }
  .authCard { width: min(420px, 100%); animation: none; }
  .authMsg { font-size: 12px; line-height: 1.5; color: var(--muted-strong); margin: var(--space-3) 0 0; min-height: 1.5em; }
  .authMsg[data-error="1"] { color: var(--neg); }
  .authForgot { padding: 0; font-size: 12px; margin-top: var(--space-4); }
</style>
</head>
<body>
<main class="page grain-overlay">
  <div class="authCard panel">
    <div class="panelHead">
      <div>
        <p class="panelEyebrow">Patron</p>
        <h1 class="panelTitle" id="authTitle">Sign in</h1>
      </div>
      <span id="themeSeg"></span>
    </div>

    <form id="authForm">
      <div class="field" id="emailField">
        <label class="fieldLabel" for="authEmail">Email</label>
        <input class="fieldInput" id="authEmail" type="email" autocomplete="email" required />
      </div>
      <div class="field" id="passField" style="margin-top:var(--space-3)">
        <label class="fieldLabel" for="authPassword">Password</label>
        <input class="fieldInput" id="authPassword" type="password" autocomplete="current-password" minlength="6" required />
      </div>
      <div class="panelActions">
        <button type="button" id="authToggle" class="btn btn-link spacer">Need an account? Sign up</button>
        <button type="submit" id="authSubmit" class="btn btn-primary">Sign in</button>
      </div>
    </form>
    <button type="button" id="authForgot" class="btn btn-link authForgot">Forgot password?</button>

    <p class="authMsg" id="authMsg"></p>
  </div>
</main>

<script src="theme.js"></script>
<script>document.getElementById('themeSeg').innerHTML = Patron.switcherHtml();</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  var sb = null;
  var mode = 'signin';

  var form = document.getElementById('authForm');
  var emailField = document.getElementById('emailField');
  var emailEl = document.getElementById('authEmail');
  var passEl = document.getElementById('authPassword');
  var submitBtn = document.getElementById('authSubmit');
  var toggleBtn = document.getElementById('authToggle');
  var forgotBtn = document.getElementById('authForgot');
  var titleEl = document.getElementById('authTitle');
  var msgEl = document.getElementById('authMsg');

  function reveal() { document.documentElement.style.visibility = ''; }
  function showMsg(text, isError) {
    msgEl.textContent = text || '';
    if (isError) msgEl.setAttribute('data-error', '1'); else msgEl.removeAttribute('data-error');
  }
  function redirectTarget() {
    return new URLSearchParams(location.search).get('redirect') || 'index.html';
  }

  function setMode(m) {
    mode = m;
    showMsg('');
    if (m === 'signin') {
      titleEl.textContent = 'Sign in';
      submitBtn.textContent = 'Sign in';
      toggleBtn.textContent = 'Need an account? Sign up';
      toggleBtn.style.display = '';
      forgotBtn.style.display = '';
      emailField.style.display = '';
      passEl.setAttribute('autocomplete', 'current-password');
    } else if (m === 'signup') {
      titleEl.textContent = 'Create account';
      submitBtn.textContent = 'Sign up';
      toggleBtn.textContent = 'Have an account? Sign in';
      toggleBtn.style.display = '';
      forgotBtn.style.display = '';
      emailField.style.display = '';
      passEl.setAttribute('autocomplete', 'new-password');
    } else if (m === 'recovery') {
      titleEl.textContent = 'Set a new password';
      submitBtn.textContent = 'Save password';
      toggleBtn.style.display = 'none';
      forgotBtn.style.display = 'none';
      emailField.style.display = 'none';
      passEl.removeAttribute('required');
      passEl.required = true;
      passEl.setAttribute('autocomplete', 'new-password');
    }
    reveal();
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!sb) return;
    var email = emailEl.value.trim();
    var password = passEl.value;
    submitBtn.disabled = true;
    showMsg('');

    if (mode === 'signin') {
      sb.auth.signInWithPassword({ email: email, password: password }).then(function (res) {
        submitBtn.disabled = false;
        if (res.error) { showMsg(res.error.message, true); return; }
        location.href = redirectTarget();
      });
    } else if (mode === 'signup') {
      sb.auth.signUp({ email: email, password: password }).then(function (res) {
        submitBtn.disabled = false;
        if (res.error) { showMsg(res.error.message, true); return; }
        if (res.data && res.data.session) { location.href = redirectTarget(); return; }
        showMsg('Check your email to confirm your account, then sign in.');
        setMode('signin');
      });
    } else if (mode === 'recovery') {
      sb.auth.updateUser({ password: password }).then(function (res) {
        submitBtn.disabled = false;
        if (res.error) { showMsg(res.error.message, true); return; }
        showMsg('Password updated — redirecting…');
        setTimeout(function () { location.href = 'index.html'; }, 800);
      });
    }
  });

  toggleBtn.addEventListener('click', function () { setMode(mode === 'signin' ? 'signup' : 'signin'); });

  forgotBtn.addEventListener('click', function () {
    if (!sb) return;
    var email = emailEl.value.trim();
    if (!email) { showMsg('Enter your email above first.', true); return; }
    sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + '/login.html' }).then(function (res) {
      if (res.error) { showMsg(res.error.message, true); return; }
      showMsg('Check your email for a password reset link.');
    });
  });

  function start(url, key) {
    if (!url || !key || !window.supabase || url.indexOf('PASTE-') === 0) {
      // Nothing to authenticate against on this deploy — there's no gate either.
      location.replace('index.html');
      return;
    }
    sb = window.supabase.createClient(url, key);

    if (/type=recovery/.test(location.hash)) { setMode('recovery'); return; }

    sb.auth.getSession().then(function (res) {
      if (res.data && res.data.session) { location.replace(redirectTarget()); return; }
      setMode('signin');
    }).catch(function () { setMode('signin'); });
  }

  var ovUrl = (localStorage.getItem('po_supabase_url') || '').trim();
  var ovKey = (localStorage.getItem('po_supabase_key') || '').trim();
  if (ovUrl && ovKey) { start(ovUrl, ovKey); }
  else {
    fetch('/api/config', { cache: 'no-store' })
      .then(function (r) { return r.ok ? r.json() : { url: '', key: '' }; })
      .then(function (cfg) { start((cfg && cfg.url || '').trim(), (cfg && cfg.key || '').trim()); })
      .catch(function () { location.replace('index.html'); });
  }
})();
</script>
</body>
</html>
